site_name: MAGDA Manual
site_description: User manual for MAGDA — a free, open-source digital audio workstation
site_url: https://Conceptual-Machines.github.io/magda-core/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  logo: assets/images/magda-lisa.svg
  favicon: assets/images/magda-lisa.svg
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/Conceptual-Machines/magda-core
repo_name: magda-core

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - First Session: getting-started/first-session.md
      - Localization: localization.md
  - Interface Layout:
      - Overview: interface/overview.md
      - Menus: interface/menus.md
      - Preferences: interface/preferences.md
      - Audio Settings: interface/audio-settings.md
      - Plugin Settings: interface/plugin-settings.md
      - AI Settings: interface/ai-settings.md
      - Controllers: interface/controllers.md
  - Tracks: tracks.md
  - Clips: clips.md
  - FX Chain & Racks: fx-chain.md
  - Plugin Parameters: plugin-parameters.md
  - Arrangement View: arrangement-view.md
  - Session View: session-view.md
  - Mixer View: mixer-view.md
  - Panels:
      - Inspector: panels/inspector.md
      - Plugin & Media Browser: panels/browsers.md
      - Media Library: panels/media-library.md
      - AI Assistant: panels/ai-assistant.md
      - Editors:
          - Overview: panels/editors.md
          - Piano Roll: panels/piano-roll.md
          - Drum Grid Editor: panels/drum-grid-editor.md
          - Waveform Editor: panels/waveform-editor.md
          - Track Chain: panels/track-chain.md
      - Chord Panel: panels/chord-panel.md
  - Devices:
      - Overview: devices/built-in.md
      - MIDI Devices:
          - Arpeggiator: devices/arpeggiator.md
          - Chord Engine: devices/chord-engine.md
          - Step Sequencer: devices/step-sequencer.md
      - Instruments:
          - 4OSC Synth: devices/4osc.md
          - Drum Grid: devices/drum-grid.md
          - Sampler: devices/sampler.md
      - Effects: devices/effects.md
      - Analysis: devices/analysis.md
  - Modulation:
      - Overview: modulation/overview.md
      - Modulators: modulation/modulators.md
      - Macros: modulation/macros.md
      - Linking Parameters: modulation/linking.md
  - Automation: automation.md
  - Time Bend: time-bend.md
  - Transport: transport.md
  - Reference:
      - DSL Reference: reference/dsl.md
      - Controller Profile Format: reference/controller-profile-format.md
      - Lua Scripting: reference/lua-scripting.md
      - Keyboard Shortcuts: reference/keyboard-shortcuts.md
      - File Formats: reference/file-formats.md
      - Troubleshooting: reference/troubleshooting.md

extra:
  homepage: https://magda.land
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Conceptual-Machines/magda-core
    - icon: fontawesome/solid/globe
      link: https://magda.land
      name: MAGDA Website

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.keys
  - attr_list
  - md_in_html
  - toc:
      permalink: true
