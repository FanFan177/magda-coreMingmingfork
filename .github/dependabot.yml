version: 2
updates:
  # Git submodules (JUCE, llama.cpp, etc.)
  - package-ecosystem: "gitsubmodule"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    # Security updates
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    ignore:
      # Tracktion Engine is a fork we control and bump deliberately (it carries
      # MAGDA patches), so Dependabot must never open PRs for it.
      - dependency-name: "third_party/tracktion_engine"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    # Keep GitHub Actions up to date for security
    open-pull-requests-limit: 3
