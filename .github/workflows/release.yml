name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.1.0)'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos:
    runs-on: macos-14  # Apple Silicon; includes the CLAP semantic-search backend (ORT-only on arm64)
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive
        lfs: true

    - name: Install dependencies
      run: |
        brew install ninja create-dmg
        # Install sccache if not present
        if ! command -v sccache &>/dev/null; then
          brew install sccache
        fi

    - name: Extract version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION="${GITHUB_REF_NAME#v}"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Configure CMake (arm64)
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_ARCHITECTURES="arm64" \
          -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0" \
          -DMAGDA_BUILD_TESTS=OFF \
          -DMAGDA_FULL_VERSION="$VERSION" \
          -DCMAKE_C_COMPILER_LAUNCHER=sccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

    - name: Build
      run: cmake --build build --config Release -j $(sysctl -n hw.ncpu)

    - name: Verify app bundle
      run: |
        APP_PATH="build/magda/daw/magda_daw_app_artefacts/Release/MAGDA.app"
        if [ ! -d "$APP_PATH" ]; then
          echo "MAGDA.app not found at $APP_PATH"
          find build -name "MAGDA.app" -type d || true
          exit 1
        fi
        echo "MAGDA.app found at $APP_PATH"
        ls -la "$APP_PATH/Contents/MacOS/"

    - name: Import signing certificate
      env:
        MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
        MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      run: |
        # Create a temporary keychain for CI
        KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
        KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        # Import the p12 certificate
        echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
        security import "$RUNNER_TEMP/certificate.p12" \
          -k "$KEYCHAIN_PATH" \
          -P "$MACOS_CERTIFICATE_PASSWORD" \
          -T /usr/bin/codesign \
          -T /usr/bin/productsign
        rm "$RUNNER_TEMP/certificate.p12"

        # Allow codesign to access keys without UI prompt
        security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: \
          -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        # Add temporary keychain to search list (prepend so it's found first)
        security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

        # Verify the identity is available
        security find-identity -v -p codesigning "$KEYCHAIN_PATH"

    - name: Code sign app bundle
      run: |
        APP_PATH="build/magda/daw/magda_daw_app_artefacts/Release/MAGDA.app"
        IDENTITY="Developer ID Application: Luca Romagnoli (VH54FX3Z7U)"
        ENTITLEMENTS="packaging/macos/entitlements.plist"

        # Sign the plugin scanner first (nested executable)
        if [ -f "$APP_PATH/Contents/MacOS/magda_plugin_scanner" ]; then
          echo "Signing plugin scanner..."
          codesign --force --verify --verbose --timestamp \
            --options runtime \
            --entitlements "$ENTITLEMENTS" \
            --sign "$IDENTITY" \
            "$APP_PATH/Contents/MacOS/magda_plugin_scanner"
        fi

        # Sign any embedded frameworks/dylibs
        find "$APP_PATH/Contents/Frameworks" -name "*.dylib" -o -name "*.framework" 2>/dev/null | while read -r lib; do
          echo "Signing: $lib"
          codesign --force --verify --verbose --timestamp \
            --options runtime \
            --sign "$IDENTITY" \
            "$lib"
        done

        # Sign the main app bundle
        echo "Signing MAGDA.app..."
        codesign --force --verify --verbose --timestamp \
          --options runtime \
          --entitlements "$ENTITLEMENTS" \
          --sign "$IDENTITY" \
          "$APP_PATH"

    - name: Verify signature
      run: |
        APP_PATH="build/magda/daw/magda_daw_app_artefacts/Release/MAGDA.app"
        echo "Verifying codesign..."
        codesign --verify --deep --strict --verbose=2 "$APP_PATH"
        echo "Verifying Gatekeeper assessment..."
        spctl --assess --type execute -vvv "$APP_PATH" || echo "spctl check failed (may need notarization)"

    - name: Create DMG
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        APP_PATH="build/magda/daw/magda_daw_app_artefacts/Release/MAGDA.app"
        DMG_NAME="MAGDA-${VERSION}-macOS-arm64.dmg"

        # create-dmg may exit non-zero if AppleScript Finder styling fails
        # (common on CI). The DMG is still valid in that case.
        set +e
        create-dmg \
          --volname "MAGDA" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "MAGDA.app" 150 190 \
          --app-drop-link 450 190 \
          "$DMG_NAME" \
          "$APP_PATH"
        CREATE_DMG_EXIT=$?
        set -e

        if [ ! -f "$DMG_NAME" ]; then
          echo "create-dmg failed and no DMG was produced (exit code $CREATE_DMG_EXIT)"
          exit 1
        fi

        echo "DMG created: $DMG_NAME"
        ls -lh "$DMG_NAME"

    - name: Sign DMG
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        DMG_NAME="MAGDA-${VERSION}-macOS-arm64.dmg"
        codesign --force --sign "Developer ID Application: Luca Romagnoli (VH54FX3Z7U)" "$DMG_NAME"
        codesign --verify --verbose "$DMG_NAME"

    - name: Notarize DMG
      timeout-minutes: 30
      env:
        VERSION: ${{ steps.version.outputs.version }}
        NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
        NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
      run: |
        DMG_NAME="MAGDA-${VERSION}-macOS-arm64.dmg"

        echo "Submitting for notarization..."
        SUBMIT_OUTPUT=$(xcrun notarytool submit "$DMG_NAME" \
          --apple-id "$NOTARIZATION_APPLE_ID" \
          --password "$NOTARIZATION_PASSWORD" \
          --team-id "VH54FX3Z7U" \
          --wait 2>&1) || true
        echo "$SUBMIT_OUTPUT"

        # Extract submission ID and check status (disable pipefail for grep)
        set +o pipefail
        SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}') || true
        STATUS=$(echo "$SUBMIT_OUTPUT" | grep "status:" | tail -1 | awk '{print $2}') || true
        set -o pipefail

        if [ -z "$SUBMISSION_ID" ] || [ -z "$STATUS" ]; then
          echo "Failed to parse notarization output:"
          echo "$SUBMIT_OUTPUT"
          exit 1
        fi

        if [ "$STATUS" != "Accepted" ]; then
          echo "Notarization failed with status: $STATUS"
          echo "Fetching notarization log..."
          xcrun notarytool log "$SUBMISSION_ID" \
            --apple-id "$NOTARIZATION_APPLE_ID" \
            --password "$NOTARIZATION_PASSWORD" \
            --team-id "VH54FX3Z7U"
          exit 1
        fi

        echo "Stapling notarization ticket..."
        xcrun stapler staple "$DMG_NAME"

    - name: Create MuseHub app bundle (arm64)
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        # MuseHub rejects DMGs; it wants a notarized .app zipped with symlinks
        # preserved (their "zip -y"). The DMG notarization above registered this
        # app's code hash with Apple, so we can staple the ticket straight into
        # the .app, then ditto-zip it (ditto preserves the framework symlinks a
        # plain zip would flatten). Stays a CI artifact, not a public release asset.
        APP_PATH="build/magda/daw/magda_daw_app_artefacts/Release/MAGDA.app"
        ZIP_NAME="MAGDA-${VERSION}-macOS-arm64.app.zip"

        xcrun stapler staple "$APP_PATH"
        xcrun stapler validate "$APP_PATH"

        ditto -c -k --keepParent "$APP_PATH" "$ZIP_NAME"
        shasum -a 256 "$ZIP_NAME" > "${ZIP_NAME}.sha256"
        echo "MuseHub bundle created: $ZIP_NAME"
        ls -lh "$ZIP_NAME"

    - name: Generate checksum
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        DMG_NAME="MAGDA-${VERSION}-macOS-arm64.dmg"
        shasum -a 256 "$DMG_NAME" > "${DMG_NAME}.sha256"
        cat "${DMG_NAME}.sha256"

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: macos-release
        path: |
          MAGDA-*-macOS-arm64.dmg
          MAGDA-*-macOS-arm64.dmg.sha256
          MAGDA-*-macOS-arm64.app.zip
          MAGDA-*-macOS-arm64.app.zip.sha256

    - name: Clean up
      if: always()
      run: |
        # Remove temporary signing keychain
        KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
        if [ -f "$KEYCHAIN_PATH" ]; then
          security delete-keychain "$KEYCHAIN_PATH"
        fi
        rm -rf build

  build-macos-x86_64:
    # Intel Mac build (MAGDA_HAVE_CLAP=OFF, no semantic search).
    # macos-15-intel is the last x86_64 runner GitHub offers (available until
    # Aug 2027). macos-13 was retired in Dec 2025. After macos-15-intel goes
    # away we will need a self-hosted runner or to drop this build.
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.ref_name, '-') }}
    runs-on: macos-15-intel
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive
        lfs: true

    - name: Install dependencies
      run: |
        brew install ninja create-dmg
        if ! command -v sccache &>/dev/null; then
          brew install sccache
        fi

    - name: Extract version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION="${GITHUB_REF_NAME#v}"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Configure CMake (x86_64)
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_ARCHITECTURES="x86_64" \
          -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0" \
          -DMAGDA_BUILD_TESTS=OFF \
          -DMAGDA_FULL_VERSION="$VERSION" \
          -DCMAKE_C_COMPILER_LAUNCHER=sccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

    - name: Build
      run: cmake --build build --config Release -j $(sysctl -n hw.ncpu)

    - name: Verify app bundle
      run: |
        APP_PATH="build/magda/daw/magda_daw_app_artefacts/Release/MAGDA.app"
        if [ ! -d "$APP_PATH" ]; then
          echo "MAGDA.app not found at $APP_PATH"
          find build -name "MAGDA.app" -type d || true
          exit 1
        fi
        echo "MAGDA.app found at $APP_PATH"
        ls -la "$APP_PATH/Contents/MacOS/"

    - name: Import signing certificate
      env:
        MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
        MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      run: |
        KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
        KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
        security import "$RUNNER_TEMP/certificate.p12" \
          -k "$KEYCHAIN_PATH" \
          -P "$MACOS_CERTIFICATE_PASSWORD" \
          -T /usr/bin/codesign \
          -T /usr/bin/productsign
        rm "$RUNNER_TEMP/certificate.p12"

        security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: \
          -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

        security find-identity -v -p codesigning "$KEYCHAIN_PATH"

    - name: Code sign app bundle
      run: |
        APP_PATH="build/magda/daw/magda_daw_app_artefacts/Release/MAGDA.app"
        IDENTITY="Developer ID Application: Luca Romagnoli (VH54FX3Z7U)"
        ENTITLEMENTS="packaging/macos/entitlements.plist"

        if [ -f "$APP_PATH/Contents/MacOS/magda_plugin_scanner" ]; then
          echo "Signing plugin scanner..."
          codesign --force --verify --verbose --timestamp \
            --options runtime \
            --entitlements "$ENTITLEMENTS" \
            --sign "$IDENTITY" \
            "$APP_PATH/Contents/MacOS/magda_plugin_scanner"
        fi

        find "$APP_PATH/Contents/Frameworks" -name "*.dylib" -o -name "*.framework" 2>/dev/null | while read -r lib; do
          echo "Signing: $lib"
          codesign --force --verify --verbose --timestamp \
            --options runtime \
            --sign "$IDENTITY" \
            "$lib"
        done

        echo "Signing MAGDA.app..."
        codesign --force --verify --verbose --timestamp \
          --options runtime \
          --entitlements "$ENTITLEMENTS" \
          --sign "$IDENTITY" \
          "$APP_PATH"

    - name: Verify signature
      run: |
        APP_PATH="build/magda/daw/magda_daw_app_artefacts/Release/MAGDA.app"
        echo "Verifying codesign..."
        codesign --verify --deep --strict --verbose=2 "$APP_PATH"
        echo "Verifying Gatekeeper assessment..."
        spctl --assess --type execute -vvv "$APP_PATH" || echo "spctl check failed (may need notarization)"

    - name: Create DMG
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        APP_PATH="build/magda/daw/magda_daw_app_artefacts/Release/MAGDA.app"
        DMG_NAME="MAGDA-${VERSION}-macOS-x86_64.dmg"

        set +e
        create-dmg \
          --volname "MAGDA" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "MAGDA.app" 150 190 \
          --app-drop-link 450 190 \
          "$DMG_NAME" \
          "$APP_PATH"
        CREATE_DMG_EXIT=$?
        set -e

        if [ ! -f "$DMG_NAME" ]; then
          echo "create-dmg failed and no DMG was produced (exit code $CREATE_DMG_EXIT)"
          exit 1
        fi

        echo "DMG created: $DMG_NAME"
        ls -lh "$DMG_NAME"

    - name: Sign DMG
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        DMG_NAME="MAGDA-${VERSION}-macOS-x86_64.dmg"
        codesign --force --sign "Developer ID Application: Luca Romagnoli (VH54FX3Z7U)" "$DMG_NAME"
        codesign --verify --verbose "$DMG_NAME"

    - name: Notarize DMG
      timeout-minutes: 30
      env:
        VERSION: ${{ steps.version.outputs.version }}
        NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
        NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
      run: |
        DMG_NAME="MAGDA-${VERSION}-macOS-x86_64.dmg"

        echo "Submitting for notarization..."
        SUBMIT_OUTPUT=$(xcrun notarytool submit "$DMG_NAME" \
          --apple-id "$NOTARIZATION_APPLE_ID" \
          --password "$NOTARIZATION_PASSWORD" \
          --team-id "VH54FX3Z7U" \
          --wait 2>&1) || true
        echo "$SUBMIT_OUTPUT"

        set +o pipefail
        SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}') || true
        STATUS=$(echo "$SUBMIT_OUTPUT" | grep "status:" | tail -1 | awk '{print $2}') || true
        set -o pipefail

        if [ -z "$SUBMISSION_ID" ] || [ -z "$STATUS" ]; then
          echo "Failed to parse notarization output:"
          echo "$SUBMIT_OUTPUT"
          exit 1
        fi

        if [ "$STATUS" != "Accepted" ]; then
          echo "Notarization failed with status: $STATUS"
          echo "Fetching notarization log..."
          xcrun notarytool log "$SUBMISSION_ID" \
            --apple-id "$NOTARIZATION_APPLE_ID" \
            --password "$NOTARIZATION_PASSWORD" \
            --team-id "VH54FX3Z7U"
          exit 1
        fi

        echo "Stapling notarization ticket..."
        xcrun stapler staple "$DMG_NAME"

    - name: Create MuseHub app bundle (x86_64)
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        # MuseHub rejects DMGs; it wants a notarized .app zipped with symlinks
        # preserved (their "zip -y"). The DMG notarization above registered this
        # app's code hash with Apple, so we can staple the ticket straight into
        # the .app, then ditto-zip it (ditto preserves the framework symlinks a
        # plain zip would flatten). Stays a CI artifact, not a public release asset.
        APP_PATH="build/magda/daw/magda_daw_app_artefacts/Release/MAGDA.app"
        ZIP_NAME="MAGDA-${VERSION}-macOS-x86_64.app.zip"

        xcrun stapler staple "$APP_PATH"
        xcrun stapler validate "$APP_PATH"

        ditto -c -k --keepParent "$APP_PATH" "$ZIP_NAME"
        shasum -a 256 "$ZIP_NAME" > "${ZIP_NAME}.sha256"
        echo "MuseHub bundle created: $ZIP_NAME"
        ls -lh "$ZIP_NAME"

    - name: Generate checksum
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        DMG_NAME="MAGDA-${VERSION}-macOS-x86_64.dmg"
        shasum -a 256 "$DMG_NAME" > "${DMG_NAME}.sha256"
        cat "${DMG_NAME}.sha256"

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: macos-x86_64-release
        path: |
          MAGDA-*-macOS-x86_64.dmg
          MAGDA-*-macOS-x86_64.dmg.sha256
          MAGDA-*-macOS-x86_64.app.zip
          MAGDA-*-macOS-x86_64.app.zip.sha256

    - name: Clean up
      if: always()
      run: |
        KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
        if [ -f "$KEYCHAIN_PATH" ]; then
          security delete-keychain "$KEYCHAIN_PATH"
        fi
        rm -rf build

  build-windows:
    runs-on: windows-latest-8core
    env:
      NSIS_VERSION: "3.10"
      VCPKG_COMMIT: a0b1c8d3a477c1cb4813d8e127a56961707ca42b
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive
        lfs: true

    - name: Extract version
      id: version
      shell: powershell
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $version = "${{ github.event.inputs.version }}"
        } else {
          $version = "${{ github.ref_name }}".TrimStart("v")
        }
        echo "version=$version" >> $env:GITHUB_OUTPUT
        Write-Output "Version: $version"

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Setup pinned vcpkg
      shell: powershell
      run: |
        $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
        git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
        git -C $vcpkgRoot checkout $env:VCPKG_COMMIT
        & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
        "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Cache vcpkg packages
      uses: actions/cache@v5
      with:
        path: .vcpkg-binary-cache
        key: ${{ runner.os }}-vcpkg-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-${{ env.VCPKG_COMMIT }}-

    - name: Install libxml2
      shell: powershell
      env:
        VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\.vcpkg-binary-cache
      run: |
        New-Item -ItemType Directory -Force -Path "$env:VCPKG_DEFAULT_BINARY_CACHE" | Out-Null
        & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet x64-windows

    # Ninja is shipped with the Visual Studio install on windows-latest, so
    # we only need to provision NSIS. The zip is hosted as a release asset
    # on this repo's "vendor/nsis-X.Y" tag - GitHub-hosted, rock-solid, no
    # third-party CDN flakes. Bumping NSIS_VERSION means uploading the new
    # zip to a new vendor/nsis-X.Y release tag and refreshing NSIS_SHA256.
    - name: Cache NSIS
      uses: actions/cache@v5
      id: cache-nsis
      with:
        path: ${{ runner.temp }}\nsis-${{ env.NSIS_VERSION }}
        key: nsis-${{ env.NSIS_VERSION }}

    - name: Verify Ninja and provision NSIS
      shell: powershell
      env:
        # Pinned hash matches the contents of the Sourceforge release for
        # NSIS_VERSION above. Bumping the version means computing a fresh
        # hash with `Get-FileHash -Algorithm SHA256` (or `shasum -a 256`).
        NSIS_SHA256: "fcdce3229717a2a148e7cda0ab5bdb667f39d8fb33ede1da8dabc336bd5ad110"
      run: |
        # Ninja: prefer whatever the VS install ships; only bail if missing.
        if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
          Write-Error "ninja not found on PATH (expected via Visual Studio install)"
          exit 1
        }

        # NSIS: vendored as a GitHub release asset on this repo. Three
        # attempts with a small backoff covers any transient blip; PS 5.1
        # doesn't support Invoke-WebRequest's -MaximumRetryCount so retries
        # are spelled out.
        $nsisDir = "$env:RUNNER_TEMP\nsis-$env:NSIS_VERSION"
        $makensis = Join-Path $nsisDir "nsis-$env:NSIS_VERSION\makensis.exe"
        if (-not (Test-Path $makensis)) {
          $zip = "$env:RUNNER_TEMP\nsis-$env:NSIS_VERSION.zip"
          $url = "https://github.com/${env:GITHUB_REPOSITORY}/releases/download/vendor/nsis-$env:NSIS_VERSION/nsis-$env:NSIS_VERSION.zip"
          $downloaded = $false
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            try {
              Write-Output "Downloading NSIS $env:NSIS_VERSION from $url (attempt $attempt/3)"
              Invoke-WebRequest -Uri $url -OutFile $zip
              if ((Test-Path $zip) -and ((Get-Item $zip).Length -gt 1MB)) {
                $downloaded = $true
                break
              }
              Write-Output "Downloaded file was missing or too small"
            } catch {
              Write-Output "Download attempt $attempt failed: $($_.Exception.Message)"
            }
            if ($attempt -lt 3) { Start-Sleep -Seconds 5 }
          }
          if (-not $downloaded) {
            Write-Error "NSIS download failed after 3 attempts"
            exit 1
          }

          # Supply-chain check: refuse to extract if the zip doesn't match
          # the pinned hash for this version.
          $actual = (Get-FileHash -Path $zip -Algorithm SHA256).Hash.ToLower()
          $expected = $env:NSIS_SHA256.ToLower()
          if ($actual -ne $expected) {
            Write-Error "NSIS zip hash mismatch - expected $expected, got $actual"
            exit 1
          }
          Write-Output "NSIS zip hash OK ($actual)"

          Expand-Archive -Path $zip -DestinationPath $nsisDir -Force
        } else {
          Write-Output "NSIS $env:NSIS_VERSION already cached"
        }

        if (-not (Test-Path $makensis)) {
          Write-Error "makensis.exe missing after extraction at $makensis"
          exit 1
        }

        $bin = Split-Path -Parent $makensis
        echo "$bin" >> $env:GITHUB_PATH
        echo "MAKENSIS=$makensis" >> $env:GITHUB_ENV
        Write-Output "NSIS on PATH: $bin"
        Write-Output "Resolved makensis: $makensis"

    - name: Configure CMake
      shell: powershell
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        # /FS (required for parallel MSVC builds with /Zi) is applied in
        # CMakeLists.txt via add_compile_options, so it composes with the
        # default MSVC init flags instead of clobbering them.
        # sccache is deliberately NOT used here: release builds rarely hit the
        # cache (cold after most merges) and sccache's .obj interposition
        # bypasses /FS coordination, reintroducing C1041 PDB races.
        cmake -B build -G Ninja `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_SYSTEM_PROCESSOR=x64 `
          -DMAGDA_BUILD_TESTS=OFF `
          -DMAGDA_FULL_VERSION="$env:VERSION" `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows

    - name: Build
      shell: powershell
      run: cmake --build build --config Release

    - name: Locate MAGDA.exe
      id: locate
      shell: powershell
      run: |
        $exe = Get-ChildItem -Path build -Recurse -Filter "MAGDA.exe" | Select-Object -First 1
        if ($exe) {
          Write-Output "Found: $($exe.FullName)"
          echo "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
        } else {
          Write-Error "MAGDA.exe not found"
          exit 1
        }

    - name: Locate and stage PDB
      shell: powershell
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        $pdb = Get-ChildItem -Path build -Recurse -Filter "MAGDA.pdb" | Select-Object -First 1
        if ($pdb) {
          $pdbName = "MAGDA-$env:VERSION-Windows-x86_64.pdb"
          Copy-Item $pdb.FullName $pdbName
          Write-Output "Staged PDB: $pdbName"
        } else {
          Write-Warning "MAGDA.pdb not found - crash symbolization unavailable for this release"
        }

    - name: Create installer
      shell: powershell
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        # Stage installer inputs into an ephemeral directory outside the source
        # tree so the checkout stays clean and every shipped artifact appears
        # here explicitly. The .nsi uses ${__FILEDIR__} and finds files next to
        # itself, so staging and makensis invocation agree without chdir.
        $stage = Join-Path $env:RUNNER_TEMP "magda-installer-stage"
        if (Test-Path $stage) { Remove-Item -Recurse -Force $stage }
        New-Item -ItemType Directory -Path $stage | Out-Null

        Copy-Item "packaging\windows\magda-installer.nsi" "$stage\"
        Copy-Item "assets\mgd_doc_icon.ico" "$stage\"
        Copy-Item "${{ steps.locate.outputs.exe_path }}" "$stage\MAGDA.exe"

        $exeDir = Split-Path "${{ steps.locate.outputs.exe_path }}"
        $scanner = Join-Path $exeDir "magda_plugin_scanner.exe"
        if (Test-Path $scanner) {
          Copy-Item $scanner "$stage\magda_plugin_scanner.exe"
          Write-Output "Copied plugin scanner to staging"
        } else {
          Write-Warning "magda_plugin_scanner.exe not found at $scanner"
        }

        # Runtime DLLs sitting next to MAGDA.exe: the ONNX Runtime DLLs (media DB
        # sample tagger) and libxml2.dll + its transitive deps (DAWproject XSD
        # validation), all placed there by the build's POST_BUILD steps. Windows
        # only resolves DLLs from the exe's own directory, so every one must ship
        # in the install dir. Stage them all rather than hardcoding names, so a
        # new vcpkg dep can't silently go missing - then assert the critical ones
        # are present, because a missing DLL is a broken release.
        $dlls = Get-ChildItem -Path $exeDir -Filter *.dll -File
        foreach ($required in @("onnxruntime.dll", "onnxruntime_providers_shared.dll", "libxml2.dll")) {
          if (-not ($dlls | Where-Object { $_.Name -ieq $required })) {
            Write-Error "$required missing next to MAGDA.exe at $exeDir"
            exit 1
          }
        }
        foreach ($dll in $dlls) {
          Copy-Item $dll.FullName "$stage\$($dll.Name)"
          Write-Output "Staged $($dll.Name) for installer"
        }

        Copy-Item -Recurse "lang" "$stage\lang"
        Write-Output "Staged lang/ for installer"

        # Guard against a regression where lang/ stops being bundled - 0.5
        # shipped with missing translations because staging silently dropped it.
        if (-not (Test-Path "$stage\lang\en.json")) {
          Write-Error "lang/en.json missing from installer staging"
          exit 1
        }

        # Controller profiles + Lua scripts. POST_BUILD already places
        # controllers/ next to MAGDA.exe; mirror that exact layout into
        # staging so runtime probes (<exe>/controllers/{profiles,scripts})
        # find them after install.
        $controllersSrc = Join-Path $exeDir "controllers"
        $controllersDst = Join-Path $stage "controllers"
        if (-not (Test-Path $controllersSrc)) {
          Write-Error "controllers/ missing next to MAGDA.exe at $controllersSrc"
          exit 1
        }
        New-Item -ItemType Directory -Path $controllersDst -ErrorAction Stop | Out-Null
        Copy-Item -Recurse "$controllersSrc\*" $controllersDst -ErrorAction Stop
        Write-Output "Staged controllers/ for installer"

        if (-not (Test-Path "$controllersDst\profiles")) {
          Write-Error "controllers/profiles missing from installer staging"
          exit 1
        }
        if (-not (Test-Path "$controllersDst\scripts")) {
          Write-Error "controllers/scripts missing from installer staging"
          exit 1
        }

        # Faust standard libraries, stock drumkits, and DAWproject XSD schemas.
        # POST_BUILD places all three next to MAGDA.exe; the app loads them from
        # the exe's own directory (libfaust -I path, DrumkitManager seed,
        # DawProjectValidator <exe>/dawproject/*.xsd), so mirror them into
        # staging. Without dawproject/ the validator falls back to the baked-in
        # build-tree source path, which does not exist on an end-user machine.
        foreach ($dir in @("faustlibraries", "drumkits", "dawproject", "models")) {
          $src = Join-Path $exeDir $dir
          if (-not (Test-Path $src)) {
            Write-Error "$dir/ missing next to MAGDA.exe at $src"
            exit 1
          }
          Copy-Item -Recurse $src "$stage\$dir"
          Write-Output "Staged $dir/ for installer"
        }

        & $env:MAKENSIS /DVERSION=$env:VERSION "$stage\magda-installer.nsi"

        $installerName = "MAGDA-$env:VERSION-Windows-x86_64-Setup.exe"
        Move-Item "$stage\MAGDA-$env:VERSION-Windows-Setup.exe" $installerName

        Write-Output "Installer created: $installerName"
        Get-ChildItem $installerName

    - name: Generate checksum
      shell: powershell
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        $installer = "MAGDA-$env:VERSION-Windows-x86_64-Setup.exe"
        $hash = Get-FileHash -Algorithm SHA256 $installer
        "$($hash.Hash)  $installer" | Out-File -Encoding utf8 "$installer.sha256"
        Get-Content "$installer.sha256"

    - name: Create MuseHub source bundle
      # pwsh (PowerShell 7), NOT Windows PowerShell 5.1: 5.1's Compress-Archive
      # writes ZIP entry names with backslash separators, which violates the ZIP
      # spec (forward slashes required) and breaks the nested controllers/, lang/
      # etc. trees on extraction. pwsh's Compress-Archive emits forward slashes.
      shell: pwsh
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        # The installer staging dir already holds the exact inputs the .nsi
        # consumes (unsigned exes, ONNX DLLs, icon, lang/, controllers/). The
        # MuseHub bundle is that staging dir plus the build wrapper, a version
        # marker, and the README, zipped for the partner to sign and build.
        $stage = Join-Path $env:RUNNER_TEMP "magda-installer-stage"
        if (-not (Test-Path "$stage\magda-installer.nsi")) {
          Write-Error "installer staging missing at $stage - did the Create installer step run?"
          exit 1
        }

        Copy-Item "packaging\windows\musehub\build-installer.ps1" "$stage\"
        Copy-Item "packaging\windows\musehub\README.md" "$stage\"
        Set-Content -Path "$stage\version.txt" -Value $env:VERSION -NoNewline -Encoding ascii

        # Belt-and-braces: never ship a built installer inside the source bundle
        # (the Create installer step already moved it out of the stage).
        Get-ChildItem $stage -Filter "*Setup.exe" | Remove-Item -Force -ErrorAction SilentlyContinue

        $zip = "MAGDA-$env:VERSION-MuseHub-Source.zip"
        if (Test-Path $zip) { Remove-Item -Force $zip }
        $items = Get-ChildItem -Path $stage
        Compress-Archive -Path $items.FullName -DestinationPath $zip
        Write-Output "MuseHub source bundle created: $zip"
        Get-ChildItem $zip

        $hash = Get-FileHash -Algorithm SHA256 $zip
        # ASCII (not utf8): Windows PowerShell 5.1's utf8 writes a BOM that
        # breaks `sha256sum -c` parsing of the first line.
        "$($hash.Hash)  $zip" | Out-File -Encoding ascii "$zip.sha256"
        Get-Content "$zip.sha256"

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: windows-x86_64-release
        path: |
          MAGDA-*-Windows-x86_64-Setup.exe
          MAGDA-*-Windows-x86_64-Setup.exe.sha256
          MAGDA-*-Windows-x86_64.pdb
          MAGDA-*-MuseHub-Source.zip
          MAGDA-*-MuseHub-Source.zip.sha256

    - name: Clean up
      if: always()
      shell: powershell
      run: |
        Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue
        Remove-Item -Recurse -Force (Join-Path $env:RUNNER_TEMP "magda-installer-stage") -ErrorAction SilentlyContinue

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive
        lfs: true

    - name: Extract version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION="${GITHUB_REF_NAME#v}"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          pkg-config \
          libgtk-3-dev \
          libasound2-dev \
          libjack-jackd2-dev \
          ladspa-sdk \
          libcurl4-openssl-dev \
          libfreetype6-dev \
          libx11-dev \
          libxcomposite-dev \
          libxcursor-dev \
          libxext-dev \
          libxinerama-dev \
          libxrandr-dev \
          libxrender-dev \
          libwebkit2gtk-4.1-dev \
          libglu1-mesa-dev \
          mesa-common-dev \
          libfuse2

    - name: Install linuxdeploy
      run: |
        wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage

    - name: Install sccache
      run: |
        if ! command -v sccache &>/dev/null; then
          echo "Installing sccache..."
          wget -q https://github.com/mozilla/sccache/releases/download/v0.8.1/sccache-v0.8.1-x86_64-unknown-linux-musl.tar.gz
          tar xzf sccache-v0.8.1-x86_64-unknown-linux-musl.tar.gz
          sudo mv sccache-v0.8.1-x86_64-unknown-linux-musl/sccache /usr/local/bin/
        fi
        sccache --version

    - name: Configure CMake
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DMAGDA_BUILD_TESTS=OFF \
          -DMAGDA_FULL_VERSION="$VERSION" \
          -DCMAKE_C_COMPILER_LAUNCHER=sccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

    - name: Build
      run: cmake --build build --config Release -j $(nproc)

    - name: Prepare AppDir
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        APPDIR="MAGDA.AppDir"
        mkdir -p "$APPDIR/usr/bin"
        mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"
        mkdir -p "$APPDIR/usr/share/applications"

        # Find and copy the binary (look in artefacts directory)
        BINARY=$(find build -path "*/magda_daw_app_artefacts/Release/MAGDA" -type f -executable | head -1)
        if [ -z "$BINARY" ]; then
          BINARY=$(find build -name "MAGDA" -type f -executable | head -1)
        fi
        if [ -z "$BINARY" ]; then
          echo "Could not find MAGDA binary"
          find build -type f -executable | head -20
          exit 1
        fi
        echo "Found binary: $BINARY"
        cp "$BINARY" "$APPDIR/usr/bin/MAGDA"

        # Copy plugin scanner alongside the main binary
        SCANNER=$(find build -name "magda_plugin_scanner" -type f -executable | head -1)
        if [ -n "$SCANNER" ]; then
          echo "Found scanner: $SCANNER"
          cp "$SCANNER" "$APPDIR/usr/bin/magda_plugin_scanner"
        else
          echo "Warning: magda_plugin_scanner not found"
        fi

        # Localization JSON - StringTable looks for lang/ next to the binary
        cp -r lang "$APPDIR/usr/bin/lang"

        # Guard against a regression where lang/ stops being bundled - 0.5
        # shipped with missing translations because staging silently dropped it.
        test -f "$APPDIR/usr/bin/lang/en.json" \
          || { echo "lang/en.json missing from AppDir staging"; exit 1; }

        # Controller profiles + Lua scripts. POST_BUILD already places
        # controllers/ next to the binary; mirror that exact layout into
        # the AppDir so runtime probes (<exe>/controllers/{profiles,scripts})
        # find them after install.
        CONTROLLERS_SRC="$(dirname "$BINARY")/controllers"
        if [ ! -d "$CONTROLLERS_SRC" ]; then
          echo "controllers/ missing next to MAGDA binary at $CONTROLLERS_SRC"
          exit 1
        fi
        cp -r "$CONTROLLERS_SRC" "$APPDIR/usr/bin/controllers"

        test -d "$APPDIR/usr/bin/controllers/profiles" \
          || { echo "controllers/profiles missing from AppDir staging"; exit 1; }
        test -d "$APPDIR/usr/bin/controllers/scripts" \
          || { echo "controllers/scripts missing from AppDir staging"; exit 1; }

        # Faust standard libraries, stock drumkits, and DAWproject XSD schemas.
        # POST_BUILD places all three next to the binary; the app loads them from
        # the exe's own directory (libfaust -I path, DrumkitManager seed,
        # DawProjectValidator <exe>/dawproject/*.xsd), so mirror them into the
        # AppDir. Without dawproject/ the validator falls back to the baked-in
        # build-tree source path, which does not exist on an end-user machine.
        for dir in faustlibraries drumkits dawproject models; do
          src="$(dirname "$BINARY")/$dir"
          if [ ! -d "$src" ]; then
            echo "$dir/ missing next to MAGDA binary at $src"
            exit 1
          fi
          cp -r "$src" "$APPDIR/usr/bin/$dir"
        done

        # Copy icon
        cp assets/app_icon.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/magda.png"
        # Document (file-type) icon shown for .mgd files in file managers
        mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/mimetypes"
        cp assets/mgd_doc_icon.png "$APPDIR/usr/share/icons/hicolor/256x256/mimetypes/application-x-magda-project.png"

        # Create desktop entry
        printf '%s\n' \
          "[Desktop Entry]" \
          "Type=Application" \
          "Name=MAGDA" \
          "Exec=MAGDA %f" \
          "Icon=magda" \
          "Categories=AudioVideo;Audio;" \
          "MimeType=application/x-magda-project;" \
          "Comment=MAGDA Digital Audio Workstation" \
          > "$APPDIR/usr/share/applications/magda.desktop"

        # Create MIME type definition for .mgd files
        mkdir -p "$APPDIR/usr/share/mime/packages"
        cat > "$APPDIR/usr/share/mime/packages/magda.xml" << 'MIME_EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <mime-info xmlns="http://www.freedesktop.org/standards/shared-mime-info">
          <mime-type type="application/x-magda-project">
            <comment>MAGDA Project</comment>
            <glob pattern="*.mgd"/>
          </mime-type>
        </mime-info>
        MIME_EOF

        # Symlinks required by linuxdeploy
        ln -sf usr/share/applications/magda.desktop "$APPDIR/magda.desktop"
        ln -sf usr/share/icons/hicolor/256x256/apps/magda.png "$APPDIR/magda.png"

    - name: Create AppImage
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        export ARCH=x86_64
        ./linuxdeploy-x86_64.AppImage \
          --appdir MAGDA.AppDir \
          --output appimage

        # Find the generated AppImage (name depends on linuxdeploy version)
        APPIMAGE_FILE=$(ls -1 *.AppImage | grep -v linuxdeploy | head -1)
        echo "linuxdeploy produced: $APPIMAGE_FILE"
        mv "$APPIMAGE_FILE" "MAGDA-${VERSION}-Linux-x86_64.AppImage"
        chmod +x "MAGDA-${VERSION}-Linux-x86_64.AppImage"
        echo "AppImage created:"
        ls -lh "MAGDA-${VERSION}-Linux-x86_64.AppImage"

    - name: Generate checksum
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        APPIMAGE="MAGDA-${VERSION}-Linux-x86_64.AppImage"
        sha256sum "$APPIMAGE" > "${APPIMAGE}.sha256"
        cat "${APPIMAGE}.sha256"

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: linux-release
        path: |
          MAGDA-*-Linux-x86_64.AppImage
          MAGDA-*-Linux-x86_64.AppImage.sha256

  create-release:
    # Publish a GitHub Release only for tag pushes. A workflow_dispatch run is
    # for regenerating build artifacts (e.g. the MuseHub .app.zip for an already
    # released version) and must never mutate a published release.
    if: >-
      ${{
        always() &&
        startsWith(github.ref, 'refs/tags/v') &&
        needs.build-macos.result == 'success' &&
        needs.build-windows.result == 'success' &&
        needs.build-linux.result == 'success' &&
        (
          needs.build-macos-x86_64.result == 'success' ||
          needs.build-macos-x86_64.result == 'skipped'
        )
      }}
    needs: [build-macos, build-macos-x86_64, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Generate changelog from commits
      id: changelog
      run: |
        # Find previous tag
        CURRENT_TAG="v${{ needs.build-macos.outputs.version }}"
        PREV_TAG=$(git tag --sort=-v:refname | grep -v "$CURRENT_TAG" | head -1)
        if [ -z "$PREV_TAG" ]; then
          # No previous tag - list all commits
          RANGE="HEAD"
        else
          RANGE="${PREV_TAG}..HEAD"
        fi
        # Build commit log
        {
          echo 'body<<CHANGELOG_EOF'
          echo '## Commits'
          echo ''
          git log --format='- %s (%h)' "$RANGE"
          echo 'CHANGELOG_EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Download all artifacts
      uses: actions/download-artifact@v8

    - name: List artifacts
      run: find . -type f | sort

    - name: Create GitHub Prerelease
      if: contains(needs.build-macos.outputs.version, '-')
      uses: softprops/action-gh-release@v3
      with:
        tag_name: v${{ needs.build-macos.outputs.version }}
        name: MAGDA v${{ needs.build-macos.outputs.version }}
        body: ${{ steps.changelog.outputs.body }}
        draft: false
        prerelease: true
        generate_release_notes: true
        fail_on_unmatched_files: true
        files: |
          macos-release/MAGDA-*-macOS-arm64.dmg
          macos-release/MAGDA-*-macOS-arm64.dmg.sha256
          windows-x86_64-release/MAGDA-*-Windows-x86_64-Setup.exe
          windows-x86_64-release/MAGDA-*-Windows-x86_64-Setup.exe.sha256
          windows-x86_64-release/MAGDA-*-Windows-x86_64.pdb
          linux-release/*

    - name: Create GitHub Release
      if: ${{ !contains(needs.build-macos.outputs.version, '-') }}
      uses: softprops/action-gh-release@v3
      with:
        tag_name: v${{ needs.build-macos.outputs.version }}
        name: MAGDA v${{ needs.build-macos.outputs.version }}
        body: ${{ steps.changelog.outputs.body }}
        draft: false
        prerelease: false
        generate_release_notes: true
        fail_on_unmatched_files: true
        files: |
          macos-release/MAGDA-*-macOS-arm64.dmg
          macos-release/MAGDA-*-macOS-arm64.dmg.sha256
          macos-x86_64-release/MAGDA-*-macOS-x86_64.dmg
          macos-x86_64-release/MAGDA-*-macOS-x86_64.dmg.sha256
          windows-x86_64-release/MAGDA-*-Windows-x86_64-Setup.exe
          windows-x86_64-release/MAGDA-*-Windows-x86_64-Setup.exe.sha256
          windows-x86_64-release/MAGDA-*-Windows-x86_64.pdb
          linux-release/*
