name: CI

on:
  push:
    # Never run CI on the Crowdin localization branch. The sync action recreates
    # that branch on top of the latest HEAD and force-pushes, so once the base
    # branch has advanced, the push diff carries real code and paths-ignore no
    # longer skips it. Excluding by branch name is the only reliable guard.
    # 'dependabot/**' so Dependabot bumps never auto-start CI (especially the
    # self-hosted macOS/Windows build jobs). Validate a bump on demand via the
    # workflow_dispatch button instead.
    branches-ignore: [ 'l10n_crowdin_**', 'dependabot/**' ]
    tags-ignore: [ '**' ]
    # Belt-and-suspenders: also skip when a push only touches translation files.
    paths-ignore:
      - 'lang/**'
      - 'manual/**'
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:
    inputs:
      skip-cpp-build:
        description: 'Skip C++ build and test jobs'
        required: false
        type: boolean
        default: false

# Ensure only one CI run per branch at a time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_COMMIT: a0b1c8d3a477c1cb4813d8e127a56961707ca42b

jobs:
  build-and-test-linux:
    runs-on: ubuntu-latest
    # Skip C++ build/test when explicitly requested or when only non-C++ files changed
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.skip-cpp-build != 'true'

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: true

    - name: Cache apt packages
      uses: actions/cache@v5
      with:
        path: ~/apt-cache
        key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/ci.yml') }}
        restore-keys: |
          ${{ runner.os }}-apt-

    - name: Install dependencies (Linux)
      run: |
        mkdir -p ~/apt-cache
        sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          pkg-config \
          libgtk-3-dev \
          libasound2-dev \
          libjack-jackd2-dev \
          ladspa-sdk \
          libcurl4-openssl-dev \
          libfreetype6-dev \
          libx11-dev \
          libxcomposite-dev \
          libxcursor-dev \
          libxext-dev \
          libxinerama-dev \
          libxrandr-dev \
          libxrender-dev \
          libwebkit2gtk-4.1-dev \
          libglu1-mesa-dev \
          mesa-common-dev \
          xvfb
        cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-ccache-

    - name: Cache CMake build directory
      uses: actions/cache@v5
      with:
        path: |
          build
          !build/tests/magda_tests
        key: ${{ runner.os }}-build-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-build-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}-
          ${{ runner.os }}-build-

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
          -DMAGDA_BUILD_TESTS=ON \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build
      run: |
        echo "Building with $(nproc) cores..."
        cmake --build build --config Debug -j$(nproc) -- -v

    - name: Check build artifacts
      run: |
        echo "Checking build directory structure:"
        ls -la build/tests/ || echo "tests directory not found"
        find build -name "magda_tests" -type f || echo "magda_tests executable not found"

    - name: Run tests
      run: |
        if [ -f build/tests/magda_tests ]; then
          echo "Running tests..."
          cd build
          ./tests/magda_tests
        else
          echo "❌ Tests executable not found at build/tests/magda_tests"
          echo "Build directory contents:"
          find build -type f -name "*test*" || true
          exit 1
        fi

    - name: Show ccache statistics
      run: ccache -s

    - name: Test summary
      if: success()
      run: |
        echo "✅ Build and tests completed successfully on Linux"

  code-quality:
    runs-on: ubuntu-latest
    # Skip code quality checks when explicitly requested
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.skip-cpp-build != 'true'

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: true

    - name: Cache apt packages
      uses: actions/cache@v5
      with:
        path: /var/cache/apt/archives
        key: ${{ runner.os }}-apt-clang-${{ hashFiles('.github/workflows/ci.yml') }}
        restore-keys: |
          ${{ runner.os }}-apt-clang-

    - name: Install clang-format
      run: |
        # Hosted runners occasionally ship a stale Chrome apt source that can
        # fail unrelated package installs with a hash mismatch.
        sudo rm -f /etc/apt/sources.list.d/google-chrome.list /etc/apt/sources.list.d/google.list
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
        sudo apt-get update -o Acquire::Retries=3
        sudo apt-get install -y clang-format

    - name: Check code formatting
      run: |
        echo "Checking code formatting with clang-format..."
        echo "Running: find + clang-format --dry-run --Werror"

        # Run clang-format check and capture output
        # --Werror makes formatting issues return non-zero exit code
        if find magda/daw magda/agents tests -name "*.cpp" -o -name "*.hpp" -o -name "*.h" 2>/dev/null | \
          xargs clang-format --dry-run --Werror 2>&1 | tee format-check.log; then
          echo "✅ Format check passed!"
        else
          echo ""
          echo "❌ Format check found issues"
          echo "Files with formatting problems:"
          cat format-check.log
          echo ""
          echo "To fix these issues, run: make format"
          exit 1
        fi

  security-checks:
    name: Security Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false  # Not needed for security checks

    - name: Check for hardcoded secrets patterns
      run: |
        echo "Checking for common secret patterns..."

        # Check for common secret patterns
        ISSUES_FOUND=0

        # API keys
        if grep -r "api[_-]key\s*=\s*['\"][a-zA-Z0-9]\{20,\}" magda/ tests/ --include="*.cpp" --include="*.hpp" --include="*.h" 2>/dev/null; then
          echo "⚠️  Found potential API key hardcoded"
          ISSUES_FOUND=1
        fi

        # Passwords
        if grep -r "password\s*=\s*['\"][^'\"]\{8,\}" magda/ tests/ --include="*.cpp" --include="*.hpp" --include="*.h" 2>/dev/null; then
          echo "⚠️  Found potential password hardcoded"
          ISSUES_FOUND=1
        fi

        # AWS keys
        if grep -r "AKIA[0-9A-Z]\{16\}" magda/ tests/ --include="*.cpp" --include="*.hpp" --include="*.h" 2>/dev/null; then
          echo "⚠️  Found potential AWS access key"
          ISSUES_FOUND=1
        fi

        # Private keys
        if grep -r "BEGIN.*PRIVATE KEY" magda/ tests/ --include="*.cpp" --include="*.hpp" --include="*.h" 2>/dev/null; then
          echo "⚠️  Found potential private key"
          ISSUES_FOUND=1
        fi

        if [ "$ISSUES_FOUND" -eq 1 ]; then
          echo ""
          echo "❌ Potential secrets detected! Please review and remove them."
          exit 1
        else
          echo "✅ No obvious secret patterns detected"
        fi

    - name: Check for dangerous C++ patterns
      run: |
        echo "Checking for dangerous C++ patterns..."

        ISSUES_FOUND=0

        # Unsafe C functions
        echo "Checking for unsafe C functions (strcpy, sprintf, gets)..."
        if grep -rE "\b(strcpy|sprintf|gets|scanf)\s*\(" magda/ tests/ --include="*.cpp" --include="*.hpp" 2>/dev/null; then
          echo "⚠️  Found unsafe C functions - use safe alternatives"
          ISSUES_FOUND=1
        fi

        # Potential command injection
        echo "Checking for potential command injection (system calls)..."
        if grep -rE "\bsystem\s*\(" magda/ tests/ --include="*.cpp" --include="*.hpp" 2>/dev/null | grep -v "// safe:" | grep -v "filesystem"; then
          echo "⚠️  Found system() calls - verify they are safe"
          ISSUES_FOUND=1
        fi

        if [ "$ISSUES_FOUND" -eq 1 ]; then
          echo ""
          echo "⚠️  Security issues detected - please review"
          echo "Note: These are warnings and won't fail the build, but should be reviewed"
        else
          echo "✅ No dangerous patterns detected"
        fi

    - name: Verify no binary files committed
      run: |
        echo "Checking for accidentally committed binary files..."

        # Check for common binary extensions that shouldn't be in source control
        BINARIES=$(find magda/ tests/ -type f \( \
          -name "*.exe" -o \
          -name "*.dll" -o \
          -name "*.so" -o \
          -name "*.dylib" -o \
          -name "*.a" -o \
          -name "*.lib" -o \
          -name "*.o" -o \
          -name "*.obj" \
        \) 2>/dev/null || true)

        if [ -n "$BINARIES" ]; then
          echo "❌ Found binary files that shouldn't be committed:"
          echo "$BINARIES"
          exit 1
        else
          echo "✅ No unexpected binary files found"
        fi

    - name: Security check summary
      run: |
        echo "## 🔒 Security Checks Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Secret pattern scan" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Dangerous pattern scan" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Binary file verification" >> $GITHUB_STEP_SUMMARY

  build-and-test-macos:
    runs-on: [self-hosted, macOS]
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.skip-cpp-build != 'true'

    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true

    - name: Init submodules
      run: git submodule update --init --recursive

    - name: Configure CMake (Debug)
      run: |
        cmake -B build-debug -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
          -DMAGDA_BUILD_TESTS=ON

    - name: Build (Debug)
      run: cmake --build build-debug --config Debug

    - name: Run tests
      run: |
        if [ -f build-debug/tests/magda_tests ]; then
          cd build-debug && ./tests/magda_tests
        else
          echo "❌ Tests executable not found"
          exit 1
        fi

    # JUCE integration tests are intentionally skipped on the macOS
    # self-hosted runner: SharedTestEngine calls the production
    # TracktionEngineWrapper::initialize(), which loads the runner host's
    # real ~/Library/MAGDA settings, opens real CoreAudio + MIDI devices,
    # and hangs on async playback-graph reallocation. Re-enable once the
    # engine has a sandboxed test-init path. Tracking: #1172.

    - name: Configure CMake (Release)
      run: |
        cmake -B build-release -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DMAGDA_BUILD_TESTS=OFF

    - name: Build (Release)
      run: cmake --build build-release --config Release

    - name: Verify app bundle
      run: |
        APP_PATH="build-release/magda/daw/magda_daw_app_artefacts/Release/MAGDA.app"
        if [ -d "$APP_PATH" ]; then
          echo "✅ MAGDA.app built successfully"
          ls -la "$APP_PATH/Contents/MacOS/"
        else
          echo "❌ MAGDA.app not found"
          exit 1
        fi

    - name: Clean up build directories
      if: always()
      run: rm -rf build-debug build-release

    - name: Build summary
      if: success()
      run: echo "✅ macOS build and tests completed successfully"

  # Decide whether the Windows job runs on the self-hosted runner (magda-luca)
  # or falls back to windows-latest. The self-hosted runner is preferred only
  # when it is online and idle; otherwise use the GitHub-hosted runner so PRs
  # do not block behind a busy/offline local machine.
  pick-windows-runner:
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.skip-cpp-build != 'true'
    outputs:
      labels: ${{ steps.pick.outputs.labels }}
    steps:
      - name: Pick Windows runner
        id: pick
        env:
          GH_TOKEN: ${{ secrets.RUNNER_STATUS_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo 'labels=["windows-latest"]' >> "$GITHUB_OUTPUT"
            echo "No RUNNER_STATUS_PAT available in this context (e.g. Dependabot PRs do not see repo secrets); falling back to windows-latest"
            exit 0
          fi

          runner=$(gh api "repos/${{ github.repository }}/actions/runners" \
            --jq '.runners[] | select(any(.labels[]; .name == "magda-luca")) | [.status, .busy] | @tsv' \
            | head -n1 || true)

          status=$(printf '%s' "$runner" | cut -f1)
          busy=$(printf '%s' "$runner" | cut -f2)

          # The runner only reports busy=true once a job has actually landed on
          # it. This pick job runs at the very start of the workflow, long before
          # the Windows build job dispatches, so two CI runs starting close
          # together both see busy=false and both target magda-luca - the second
          # then queues behind the first instead of falling back. Guard against
          # that by also falling back when any other CI run is already in flight.
          # Count every run that is not yet completed (queued/in_progress/
          # waiting/...): a competing run can still be queued, not in_progress,
          # at the moment this step executes, and it has already picked a runner.
          inflight=$(gh api "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?per_page=100" \
            --jq "[.workflow_runs[] | select(.id != ${{ github.run_id }}) | select(.status != \"completed\")] | length" 2>/dev/null || echo "unknown")

          if [ "$status" = "online" ] && [ "$busy" != "true" ] && [ "$inflight" = "0" ]; then
            echo 'labels=["self-hosted","Windows","magda-luca"]' >> "$GITHUB_OUTPUT"
            echo "Using idle self-hosted runner: magda-luca"
          else
            echo 'labels=["windows-latest"]' >> "$GITHUB_OUTPUT"
            echo "Falling back to windows-latest (magda-luca status: '${status:-not-found}', busy: '${busy:-unknown}', inflight runs: '${inflight}')"
          fi

  build-and-test-windows:
    needs: pick-windows-runner
    runs-on: ${{ fromJSON(needs.pick-windows-runner.outputs.labels) }}
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.skip-cpp-build != 'true'

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: true

    - name: Setup MSVC x64
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Setup pinned vcpkg
      shell: powershell
      run: |
        $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
        git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
        git -C $vcpkgRoot checkout $env:VCPKG_COMMIT
        & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
        "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Cache vcpkg packages
      uses: actions/cache@v5
      with:
        path: .vcpkg-binary-cache
        key: ${{ runner.os }}-vcpkg-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-${{ env.VCPKG_COMMIT }}-

    - name: Install libxml2
      shell: powershell
      env:
        VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\.vcpkg-binary-cache
      run: |
        New-Item -ItemType Directory -Force -Path "$env:VCPKG_DEFAULT_BINARY_CACHE" | Out-Null
        & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet x64-windows

    - name: Configure CMake (Debug)
      run: |
        cmake -B build-debug -G Ninja `
          -DCMAKE_BUILD_TYPE=Debug `
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON `
          -DMAGDA_BUILD_TESTS=ON `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows

    - name: Build (Debug)
      run: cmake --build build-debug --config Debug

    - name: Run tests
      timeout-minutes: 5
      run: |
        $testExe = Get-ChildItem -Path build-debug -Recurse -Filter "magda_tests.exe" | Select-Object -First 1
        if ($testExe) {
          & $testExe.FullName --abort
        } else {
          Write-Error "Tests executable not found"
          exit 1
        }

    # Release configure/build/verify only run on push to main. Feature-branch
    # pushes get Debug coverage; the Release link check happens once per merge,
    # before any tag is cut. release.yml still does the full Release build
    # end-to-end on tag push.
    - name: Configure CMake (Release)
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        cmake -B build-release -G Ninja `
          -DCMAKE_BUILD_TYPE=Release `
          -DMAGDA_BUILD_TESTS=OFF `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows

    - name: Build (Release)
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: cmake --build build-release --config Release

    - name: Verify executable
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        $exe = Get-ChildItem -Path build-release -Recurse -Filter "MAGDA.exe" | Select-Object -First 1
        if ($exe) {
          Write-Output "✅ MAGDA.exe built successfully at $($exe.FullName)"
        } else {
          Write-Error "MAGDA.exe not found"
          exit 1
        }

    # Keep build dirs on self-hosted so incremental builds work; only wipe on
    # GitHub-hosted runners where the VM is thrown away anyway.
    - name: Clean up build directories
      if: always() && runner.environment == 'github-hosted'
      run: |
        Remove-Item -Recurse -Force build-debug -ErrorAction SilentlyContinue
        Remove-Item -Recurse -Force build-release -ErrorAction SilentlyContinue

    - name: Build summary
      if: success()
      run: Write-Output "✅ Windows build and tests completed successfully"
