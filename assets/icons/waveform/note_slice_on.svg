  <line x1="9" y1="20" x2="9" y2="22" stroke="#66AAFF" stroke-width="1" stroke-linecap="round"/>
  <line x1="13" y1="20" x2="13" y2="22" stroke="#66AAFF" stroke-width="1" stroke-linecap="round"/>
  <line x1="17" y1="20" x2="17" y2="22" stroke="#66AAFF" stroke-width="1" stroke-linecap="round"/>
